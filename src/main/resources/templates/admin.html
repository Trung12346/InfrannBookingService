<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>

<p th:text="${User}"></p>

<button th:href="@{/logout}" onclick="logout()">Logout</button>

<script>

function logout(){
    let res = confirm("Are u sure to logout")

        window.location.href = "http://localhost:8080/logout"
    }
    return false;
}
</script>
