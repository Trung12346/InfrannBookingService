<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form method="post" th:action="@{/login}">
  <label>User Name</label><br>
  <input type="text" name="username"><br>
    <p th:text="${ValidateText}"></p>
  <label>Password</label><br>
  <input type="text" name="password"><br>
    <p th:if="${param.error}">Username hoac mat khau khong dung</p>
  <a th:href="@{/password-reset/email}">Forgot password?</a>
  <input type="submit" value="Login">
</form>
<a th:href="@{/register}">Register</a>
<a th:href="@{/oauth2/authorization/google}">Login with Google</a>
<p th:if="${param.error == 'oauth2'}">email khong ton tai</p>
<p th:if="${param.error == 'disabled'}">tai khoan chua duoc xac minh</p>

</body>
</html>
